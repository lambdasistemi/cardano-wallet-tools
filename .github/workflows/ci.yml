name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build all derivations
        run: >-
          nix build --quiet
          .#default
          .#unit-tests
          .#devShells.x86_64-linux.default.inputDerivation

  build:
    name: CI build
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build
        run: nix build --quiet
      - name: Test
        run: nix run .#unit-tests --quiet
      - name: Cabal version matches manifest
        run: |
          set -euo pipefail
          if [ -f .release-please-manifest.json ]; then
            manifest=$(<.release-please-manifest.json)
            manifest="${manifest#*\".\":}"
            manifest="${manifest#*\"}"
            SEMVER="${manifest%%\"*}"
            PVP="${SEMVER}.0"
            while IFS=' ' read -r key val _; do
              [[ "$key" == "version:" ]] && { CABAL="$val"; break; }
            done < cardano-wallet-tools.cabal
            if [ "$CABAL" != "$PVP" ]; then
              echo "Version drift: cabal=${CABAL} manifest=${PVP}"
              exit 1
            fi
            echo "Version ok: ${CABAL}"
          fi

  formatting:
    name: CI format
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Check formatting
        run: nix --quiet develop -c just format-check

  hlint:
    name: CI hlint
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run HLint
        run: nix --quiet develop -c just hlint
