site_name: cardano-wallet-tools
site_description: >-
  Operator wallet-UTxO toolkit and PureScript CIP-30 browser wallet
  over one pure Haskell core.
site_url: https://lambdasistemi.github.io/cardano-wallet-tools/
repo_url: https://github.com/lambdasistemi/cardano-wallet-tools
repo_name: lambdasistemi/cardano-wallet-tools

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Design: design.md
